id: install_package_maker
header: Install Package Maker
description: Set up this project so other HISE users can install it as a package
body: |
  Turns this project into an installable HISE asset package. Once you've
  configured what's included, other users can pull it into their projects
  with `/assets install <name>`.

  - **File Types** chooses which folders ship with the package.
  - **Wildcards** narrow the selection further (include / exclude patterns).
  - **Preprocessors** lets you copy selected preprocessor macros from your
    project so users get the same DSP setup automatically.
  - **Info text** and **Clipboard** are shown / copied to the user after
    they install your package — handy for setup hints and snippets.

  > Run this wizard any time to update the configuration; the previous
  > settings are loaded automatically.

init:
  type: internal
  function: installPackageMakerDetect

tabs:
  - label: Files
    fields:
      - id: FileTypes
        type: multiselect
        label: File Types
        help: Project subfolders to include in the package.
        items:
          - Scripts
          - AdditionalSourceCode
          - Samples
          - Images
          - AudioFiles
          - SampleMaps
          - MidiFiles
          - DspNetworks
          - Presets
        itemDescriptions:
          - HiseScript files
          - C++ source files compiled into the project DLL
          - Audio sample files
          - UI image assets
          - Reference / impulse audio files
          - SampleMap definitions
          - MIDI sequences
          - DspNetwork graphs
          - User preset files
      - id: PositiveWildcard
        type: text
        label: Include Wildcards
        help: Comma-separated patterns to include (e.g. `*.js, *.png`).
        emptyText: "*"
      - id: NegativeWildcard
        type: text
        label: Exclude Wildcards
        help: Comma-separated patterns to exclude (e.g. `*.tmp, scratch/`).
        emptyText: leave empty for none
      - id: RegisterAsLocalSource
        type: toggle
        label: Add to my asset library
        help: Register this project so you can install it into your other projects with `/assets install <name>`.
        defaultValue: "true"
  - label: Preprocessors
    fields:
      - id: Preprocessors
        type: multiselect
        label: Preprocessors
        help: Preprocessor macros to copy from this project into the user's project on install.
        items: []
  - label: Messages
    fields:
      - id: InfoText
        type: text
        label: Info Text
        help: Markdown shown to the user after install (e.g. setup instructions).
        emptyText: leave empty for none
      - id: ClipboardContent
        type: text
        label: Clipboard Content
        help: Text copied to the user's clipboard after install (e.g. an `include(...)` line).
        emptyText: leave empty for none

submitLabel: Saves the package definition to this project.

tasks:
  - id: writePackageJson
    type: internal
    function: installPackageMakerWrite
    label: Save package definition

postActions: []

globalDefaults:
  FileTypes: "Scripts, AdditionalSourceCode, Samples, Images, AudioFiles, SampleMaps, MidiFiles, DspNetworks, Presets"
  PositiveWildcard: "*"
  NegativeWildcard: ""
  Preprocessors: ""
  InfoText: ""
  ClipboardContent: ""
  RegisterAsLocalSource: "true"
