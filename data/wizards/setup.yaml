id: setup
header: HISE Setup
description: Install and build HISE from source
aliases:
  - setup
body: |
  Guides you through cloning, building, and configuring HISE.
  Detects your environment automatically and skips completed steps.

  - **Clone**: Fetches the HISE repository from GitHub
  - **Build Dependencies**: Installs platform-specific build requirements
  - **Faust** (optional): Installs the Faust compiler for DSP development
  - **Compile**: Builds HISE from source using your system compiler
  - **Verify**: Confirms the built binary works correctly

  > The full build can take 30+ minutes depending on your machine.

init:
  type: internal
  function: setupDetectEnvironment

tabs:
  - label: Environment
    fields:
      - id: installPath
        type: file
        label: Install Path
        required: true
        help: Directory where HISE will be cloned and built
        directory: true
      - id: platform
        type: choice
        label: Platform
        disabled: true
        help: Detected automatically from your system
        items:
          - macOS
          - Windows
          - Linux
        valueMode: text
      - id: architecture
        type: choice
        label: Architecture
        help: Detected automatically from your system
        items:
          - arm64
          - x64
        valueMode: text

  - label: Options
    fields:
      - id: includeFaust
        type: toggle
        label: Include Faust
        help: Install Faust and build HISE with Faust support
        defaultValue: "0"
      - id: includeIpp
        type: toggle
        label: Include Intel IPP
        help: Install Intel IPP for accelerated DSP (Windows only, ~800 MB)
        defaultValue: "0"
        visibleIf:
          fieldId: platform
          value: Windows
      - id: targetCommit
        type: text
        label: Target Commit
        help: Git SHA to checkout (leave empty for latest develop)
        emptyText: latest develop
      - id: parallelJobs
        type: text
        label: Parallel Jobs
        help: Override the RAM-aware auto-detected -j value (set lower on constrained machines)

  - label: Detected
    fields:
      - id: hasGit
        type: toggle
        label: Git Installed
        disabled: true
        help: Detected automatically — skips git installation if found
      - id: compilerVersion
        type: text
        label: Compiler
        disabled: true
        help: Detected compiler name and version
      - id: hasVs
        type: toggle
        label: Visual Studio Installed
        disabled: true
        help: Detected automatically — skips VS installation if found (Windows)
        visibleIf:
          fieldId: platform
          value: Windows
      - id: hasIpp
        type: toggle
        label: Intel IPP Installed
        disabled: true
        help: Detected automatically — skips IPP installation if found (Windows)
        visibleIf:
          fieldId: platform
          value: Windows
      - id: hasFaust
        type: toggle
        label: Faust Installed
        disabled: true
        help: Detected automatically — skips Faust installation if found
      - id: vsVersion
        type: text
        label: Visual Studio Version
        disabled: true
        help: Detected major year (2022 or 2026). Drives the Projucer exporter folder.
        visibleIf:
          fieldId: platform
          value: Windows

submitLabel: Starts the HISE build pipeline (may take 30+ minutes)
tasks:
  - id: compilerInstall
    function: setupCompilerInstall
    type: internal
    label: Install compiler toolkit
  - id: gitInstall
    function: setupGitInstall
    type: internal
    label: Git Install
  - id: cloneRepo
    function: setupCloneRepo
    type: internal
    label: Clone Repository
  - id: buildDeps
    function: setupBuildDeps
    type: internal
    label: Build Dependencies
  - id: faustInstall
    function: setupFaustInstall
    type: internal
    label: Install Faust
  - id: extractSdks
    function: setupExtractSdks
    type: internal
    label: Extract SDKs
  - id: ippInstall
    function: setupIppInstall
    type: internal
    label: Install Intel IPP
  - id: adaptVsVersion
    function: setupAdaptVsVersion
    type: internal
    label: Adapt Projucer file
  - id: compile
    function: setupCompile
    type: internal
    label: Compile HISE
  - id: addPath
    function: setupAddPath
    type: internal
    label: Add to PATH
  - id: verify
    function: setupVerify
    type: internal
    label: Verify Installation
  - id: test
    function: setupTest
    type: internal
    label: Test Export
postActions: []
globalDefaults: {}
