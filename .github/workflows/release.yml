name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - run: npm install --prefer-offline --no-audit --no-fund
      - run: npm run build
      - run: node scripts/build-binary.mjs --target bun-darwin-arm64
      - run: mv dist/hise-cli dist/hise-cli-bun-darwin-arm64
      - run: node scripts/build-binary.mjs --target bun-darwin-x64
      - run: mv dist/hise-cli dist/hise-cli-bun-darwin-x64
      - run: lipo -create -output dist/hise-cli dist/hise-cli-bun-darwin-arm64 dist/hise-cli-bun-darwin-x64
      - name: Sign binary
        run: |
          codesign --force --timestamp --options runtime \
            --sign "Developer ID Application: Christoph Hart (PF9H8PK77F)" \
            dist/hise-cli
          codesign -dv --verbose=2 dist/hise-cli
      - name: Build pkg
        run: |
          mkdir -p dist/payload
          cp dist/hise-cli dist/payload/hise-cli
          VERSION=$(node -p "require('./package.json').version")
          pkgbuild --root dist/payload \
            --identifier dev.hise.cli \
            --version "$VERSION" \
            --install-location /usr/local/bin \
            --sign "Developer ID Installer: Christoph Hart (PF9H8PK77F)" \
            dist/hise-cli.pkg
      - name: Notarize pkg
        run: |
          xcrun notarytool submit dist/hise-cli.pkg \
            --keychain-profile notarize --wait
          xcrun stapler staple dist/hise-cli.pkg
      - uses: actions/upload-artifact@v4
        with:
          name: hise-cli-macos
          path: dist/hise-cli.pkg
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hise-cli.pkg

  build-windows:
    runs-on: [self-hosted, Windows]
    steps:
      - uses: actions/checkout@v4
      - run: echo "$env:LOCALAPPDATA\Programs\Inno Setup 6" >> $env:GITHUB_PATH
      - run: npm install --prefer-offline --no-audit --no-fund
      - run: npm run build
      - run: node scripts/build-binary.mjs --target bun-windows-x64
      - name: Build x64 installer
        run: |
          $version = node -p "require('./package.json').version"
          iscc /DAppVersion=$version installer\hise-cli.iss
      - run: node scripts/build-binary.mjs --target bun-windows-arm64
      - name: Build arm64 installer
        run: |
          $version = node -p "require('./package.json').version"
          iscc /DAppVersion=$version /DArch=arm64 installer\hise-cli.iss
      - uses: actions/upload-artifact@v4
        with:
          name: hise-cli-windows
          path: |
            dist/hise-cli-setup.exe
            dist/hise-cli-setup-arm64.exe
      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hise-cli-setup.exe
            dist/hise-cli-setup-arm64.exe
